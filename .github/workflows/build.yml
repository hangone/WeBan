name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          cache-python: true

      - run: uv sync

      - name: Build executable
        shell: bash
        run: |
          os_name=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          arch=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          ext=""
          [[ "$os_name" == "windows" ]] && ext=".exe"
          name="WeBan-${os_name}-${arch}${ext}"

          sep=$(python -c "import os; print(os.pathsep)")
          uv run pyinstaller --noconfirm --onefile \
            --name "$name" \
            --add-data "captcha_model.onnx${sep}." \
            --add-data "answer/answer.json${sep}answer/answer.json" \
            --add-data "config.example.toml${sep}." \
            --hidden-import nodriver \
            --hidden-import loguru \
            --hidden-import numpy \
            --hidden-import cv2 \
            --collect-submodules nodriver \
            main.py

          echo "name=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.name }}
          path: dist/${{ env.name }}*
          if-no-files-found: error

  docker:
    name: Docker ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name=${{ secrets.DOCKERHUB_USERNAME }}/weban,push=true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: echo "${{ steps.build.outputs.digest }}" > digest-${{ matrix.platform }}.txt

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform }}
          path: digest-${{ matrix.platform }}.txt

  docker-merge:
    name: Docker merge
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weban
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Merge multi-platform manifests
        run: |
          img="${{ secrets.DOCKERHUB_USERNAME }}/weban"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "$img@$(cat digests/digest-amd64.txt)" \
            "$img@$(cat digests/digest-arm64.txt)"

  release:
    name: Release
    permissions:
      contents: write
    needs: [build, docker-merge]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: WeBan-*
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
