name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-13, macos-latest]
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            ext: .exe
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
          - os: macos-13
            platform: macos
            arch: x64
            ext: ""
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          cache-python: "true"

      - name: Build online executable (default)
        shell: bash
        run: |
          uvx pyfuze . \
            --entry main.py \
            --pyproject pyproject.toml \
            --include answer \
            --unzip-path WeBan \
            --mode online \
            --uv-install-script-windows https://mirror.nju.edu.cn/astral-sh/uv/install.ps1 \
            --uv-install-script-unix https://mirror.nju.edu.cn/astral-sh/uv/install.sh \
            --env INSTALLER_DOWNLOAD_URL=https://mirror.nju.edu.cn/github-release/astral-sh/uv \
            --env UV_PYTHON_INSTALL_MIRROR=https://mirror.nju.edu.cn/github-release/astral-sh/python-build-standalone \
            --env UV_DEFAULT_INDEX=https://mirror.nju.edu.cn/pypi/web/simple \
            --output-name WeBan-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Build bundle executable
        shell: bash
        run: |
          uvx pyfuze . \
            --entry main.py \
            --pyproject pyproject.toml \
            --include answer \
            --unzip-path WeBan \
            --mode bundle \
            --output-name WeBan-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}-bundle

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          files: |
            dist/WeBan-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}
            dist/WeBan-${{ steps.version.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}-bundle${{ matrix.ext }}
          generate_release_notes: true
