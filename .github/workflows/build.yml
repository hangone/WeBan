name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  PYTHONIOENCODING: utf-8

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          cache-python: true

      - run: uv sync

      - name: Build executable
        shell: bash
        run: |
          os_name=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          arch=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          ext=""
          [[ "$os_name" == "windows" ]] && ext=".exe"
          name="WeBan-${os_name}-${arch}${ext}"

          sep=$(python -c "import os; print(os.pathsep)")
          uv run pyinstaller --noconfirm --onefile \
            --name "$name" \
            --add-data "captcha_model.onnx${sep}." \
            --add-data "answer/answer.json${sep}answer/answer.json" \
            --add-data "config.example.toml${sep}." \
            --hidden-import nodriver \
            --hidden-import loguru \
            --hidden-import numpy \
            --hidden-import cv2 \
            --collect-submodules nodriver \
            main.py

          echo "name=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.name }}
          path: dist/${{ env.name }}*
          if-no-files-found: error

  docker:
    name: Docker ${{ matrix.variant }} ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: with-browser
            platform: amd64
            runner: ubuntu-latest
          - variant: with-browser
            platform: arm64
            runner: ubuntu-24.04-arm
          - variant: without-browser
            platform: amd64
            runner: ubuntu-latest
          - variant: without-browser
            platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.variant }}
          platforms: linux/${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name=${{ secrets.DOCKERHUB_USERNAME }}/weban,push=true
          provenance: false
          cache-from: type=gha,scope=docker-${{ matrix.platform }}
          cache-to: type=gha,scope=docker-${{ matrix.platform }},mode=max

      - name: Export digest
        run: echo "${{ steps.build.outputs.digest }}" > digest-${{ matrix.variant }}-${{ matrix.platform }}.txt

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.platform }}
          path: digest-${{ matrix.variant }}-${{ matrix.platform }}.txt

  docker-merge:
    name: Docker merge
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true

      - uses: docker/metadata-action@v6
        id: meta-with-browser
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weban
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=with-browser

      - uses: docker/metadata-action@v6
        id: meta-without-browser
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weban
          tags: |
            type=semver,pattern={{version}}-without-browser
            type=raw,value=without-browser

      - name: Merge with-browser manifests
        env:
          TAGS: ${{ steps.meta-with-browser.outputs.tags }}
        run: |
          img="${{ secrets.DOCKERHUB_USERNAME }}/weban"
          args=()
          while IFS= read -r tag; do args+=("-t" "$tag"); done <<< "$TAGS"
          docker buildx imagetools create "${args[@]}" \
            "$img@$(cat digests/digest-with-browser-amd64.txt)" \
            "$img@$(cat digests/digest-with-browser-arm64.txt)"

      - name: Merge without-browser manifests
        env:
          TAGS: ${{ steps.meta-without-browser.outputs.tags }}
        run: |
          img="${{ secrets.DOCKERHUB_USERNAME }}/weban"
          args=()
          while IFS= read -r tag; do args+=("-t" "$tag"); done <<< "$TAGS"
          docker buildx imagetools create "${args[@]}" \
            "$img@$(cat digests/digest-without-browser-amd64.txt)" \
            "$img@$(cat digests/digest-without-browser-arm64.txt)"

  release:
    name: Release
    permissions:
      contents: write
    needs: [build, docker, docker-merge]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: WeBan-*
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
