name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          cache-python: true

      - run: uv sync

      - name: Build executable
        shell: bash
        run: |
          os_name=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          arch=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
          ext=""
          [[ "${{ runner.os }}" == "Windows" ]] && ext=".exe"
          name="WeBan-${os_name}-${arch}${ext}"

          sep=$(python -c "import os; print(os.pathsep)")
          uv run pyinstaller --noconfirm --onefile \
            --name "$name" \
            --add-data "captcha_model.onnx${sep}." \
            --add-data "answer/answer.json${sep}answer" \
            --add-data "config.example.toml${sep}." \
            --hidden-import nodriver \
            --hidden-import loguru \
            --hidden-import numpy \
            --hidden-import cv2 \
            --collect-submodules nodriver \
            main.py

          echo "name=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.name }}
          path: dist/${{ env.name }}*
          if-no-files-found: error

  docker:
    name: Docker ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            file: Dockerfile
            tags: |
              type=semver,pattern={{version}}
              type=semver,pattern={{major}}.{{minor}}
              type=raw,value=latest
          - variant: slim
            file: Dockerfile.slim
            tags: |
              type=semver,pattern={{version}}-slim
              type=semver,pattern={{major}}.{{minor}}-slim
              type=raw,value=slim
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/weban
          tags: ${{ matrix.tags }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
