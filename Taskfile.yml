version: "3"

tasks:
  lint:
    desc: "运行 ruff 检查代码风格"
    cmd: uv run ruff check .

  format:
    desc: "运行 ruff 格式化代码"
    cmd: uv run ruff format .

  format-check:
    desc: "检查代码格式（不修改文件）"
    cmd: uv run ruff format --check .

  typecheck:
    desc: "运行 pyright 类型检查"
    cmd: uv run pyright

  check:
    desc: "运行全部检查（lint + format-check + typecheck）"
    deps: [lint, format-check, typecheck]

  fix:
    desc: "自动修复 ruff 可修复的问题并格式化"
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  run:
    desc: "运行主程序"
    cmd: uv run python main.py